name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.test.outputs.result }}
      test_details: ${{ steps.test.outputs.details }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run tests
        id: test
        run: |
          set +e
          output=$(bun run lint 2>&1 && bun run test 2>&1)
          exit_code=$?
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ $exit_code -eq 0 ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi
          exit $exit_code

  pr-decoration:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check build
        id: build
        run: |
          set +e
          docker build -t ruralpay-dashboard:pr-check . > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test.outputs.test_result }}';
            const testDetails = `${{ needs.test.outputs.test_details }}`;
            const buildResult = '${{ steps.build.outputs.result }}';
            const testIcon = testResult === 'passed' ? '✅' : '❌';
            const buildIcon = buildResult === 'passed' ? '✅' : '❌';
            const overallIcon = (testResult === 'passed' && buildResult === 'passed') ? '🟢' : '🔴';
            const overallStatus = (testResult === 'passed' && buildResult === 'passed') ? 'Ready to merge' : 'Needs attention';

            const body = [
              `## ${overallIcon} Deploy Check — ${overallStatus}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Lint & Tests | ${testIcon} ${testResult} |`,
              `| Docker Build | ${buildIcon} ${buildResult} |`,
              '',
              '<details>',
              '<summary>Test output</summary>',
              '',
              '```',
              testDetails,
              '```',
              '</details>',
              '',
              `> Commit: ${{ github.sha }}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Deploy Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ruralpay-dashboard:${{ github.sha }} .

      - name: Save Docker image
        run: docker save ruralpay-dashboard:${{ github.sha }} | gzip > ruralpay-dashboard.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        run: scp -i ~/.ssh/deploy_key ruralpay-dashboard.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          if ! command -v docker &> /dev/null; then
            curl -fsSL https://get.docker.com | sh
            sudo usermod -aG docker $USER
          fi

          sudo docker stop ruralpay-dashboard || true
          sudo docker rm ruralpay-dashboard || true
          sudo docker images ruralpay-dashboard -q | xargs -r sudo docker rmi -f
          sudo docker image prune -f
          sudo docker load < ~/ruralpay-dashboard.tar.gz

          sudo docker run -d \
            --name ruralpay-dashboard \
            --restart unless-stopped \
            -p 3000:3000 \
            --env-file /home/${{ secrets.EC2_USER }}/admin/.env \
            -v /home/${{ secrets.EC2_USER }}/admin/.env:/app/.env \
            ruralpay-dashboard:${{ github.sha }}

          rm ~/ruralpay-dashboard.tar.gz
          EOF

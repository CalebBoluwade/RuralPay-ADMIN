name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.test.outputs.result }}
      test_details: ${{ steps.test.outputs.details }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Run tests
        id: test
        run: |
          set +e
          output=$(bun run lint 2>&1 && bun run test 2>&1)
          exit_code=$?
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ $exit_code -eq 0 ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi
          exit $exit_code

  pr-decoration:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check build
        id: build
        run: |
          set +e
          docker build -t ruralpay-dashboard:pr-check . > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test.outputs.test_result }}';
            const testDetails = `${{ needs.test.outputs.test_details }}`;
            const buildResult = '${{ steps.build.outputs.result }}';
            const testIcon = testResult === 'passed' ? '✅' : '❌';
            const buildIcon = buildResult === 'passed' ? '✅' : '❌';
            const overallIcon = (testResult === 'passed' && buildResult === 'passed') ? '🟢' : '🔴';
            const overallStatus = (testResult === 'passed' && buildResult === 'passed') ? 'Ready to merge' : 'Needs attention';

            const body = [
              `## ${overallIcon} Deploy Check — ${overallStatus}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Lint & Tests | ${testIcon} ${testResult} |`,
              `| Docker Build | ${buildIcon} ${buildResult} |`,
              '',
              '<details>',
              '<summary>Test output</summary>',
              '',
              '```',
              testDetails,
              '```',
              '</details>',
              '',
              `> Commit: ${{ github.sha }}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Deploy Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ruralpay-dashboard:${{ github.sha }} .

      - name: Save Docker image
        run: docker save ruralpay-dashboard:${{ github.sha }} | gzip > ruralpay-dashboard.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ruralpay-dashboard.tar.gz
          target: /home/${{ secrets.EC2_USER }}/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi

            sudo docker load < ~/ruralpay-dashboard.tar.gz

            sudo docker stop ruralpay-dashboard || true
            sudo docker rm ruralpay-dashboard || true

            sudo docker run -d \
              --name ruralpay-dashboard \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /home/${{ secrets.EC2_USER }}/.env.local:/app/.env.local \
              ruralpay-dashboard:${{ github.sha }}

            sudo docker image prune -f
            rm ~/ruralpay-dashboard.tar.gz
